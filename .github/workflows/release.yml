name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        run: cd web && npm ci && npm run build

      - uses: Swatinem/rust-cache@v2

      - name: Test
        run: cargo test --workspace

  release:
    needs: test
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      # The release binary embeds web/dist via rust_embed
      - name: Build frontend
        run: cd web && npm ci && npm run build

      - name: Install aarch64 cross toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary (embedded frontend)
        run: |
          cargo build --release --target ${{ matrix.target }} \
            -p solar-monitor --features solar-monitor-api/embed-frontend

      - name: Verify frontend is embedded
        run: |
          strings target/${{ matrix.target }}/release/solar-monitor | grep -q "assets/index-" \
            || { echo "ERROR: frontend not embedded in binary"; exit 1; }

      # Tarball preserves the executable bit; include the license
      - name: Package
        run: |
          tar -C target/${{ matrix.target }}/release -czf \
            solar-monitor-${{ github.ref_name }}-${{ matrix.target }}.tar.gz solar-monitor \
            -C ${{ github.workspace }} LICENSE README.md

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: solar-monitor-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
