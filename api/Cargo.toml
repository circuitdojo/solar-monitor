[package]
name = "solar-monitor-api"
version = "0.1.0"
edition = "2021"

[lib]
name = "solar_monitor_api"
path = "src/lib.rs"

[dependencies]
solar-monitor-core = { path = "../core" }
contracts = { path = "../contracts" }
axum = { version = "0.7", default-features = false, features = ["macros", "ws"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
